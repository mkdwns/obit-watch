name: Build and Deploy

permissions:
  contents: read
  packages: write

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Set version tag
        run: echo "VERSION=v1.${{ github.run_number }}" >> $GITHUB_ENV

      - name: Build
        run: |
          docker build -t ghcr.io/mkdwns/obit-watch-backend:${{ env.VERSION }} ./backend
          docker tag ghcr.io/mkdwns/obit-watch-backend:${{ env.VERSION }} ghcr.io/mkdwns/obit-watch-backend:latest
      
      - name: Push
        run: |
          docker push ghcr.io/mkdwns/obit-watch-backend:${{ env.VERSION }}
          docker push ghcr.io/mkdwns/obit-watch-backend:latest

      - name: Trigger Deploy
        run: |
          curl -X POST \
            -H "X-Deploy-Token: ${{ secrets.DEPLOY_TOKEN }}" \
            https://deploy-obit-watch.mkdwns.duckdns.org
