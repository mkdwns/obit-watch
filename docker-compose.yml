version: "3.8"

services:

  obit-watch-api:
    build: ./backend          # points to the Dockerfile in backend
    image: ghcr.io/mkdwns/obit-watch-api:v1.1
    container_name: obit-watch-api
    restart: unless-stopped
    ports:
      - "8001:8000"
    volumes:
      - ./data:/app/data
    environment:
      - DB_PATH=/app/data/obit_watch.db
      - SMTP_HOST=smtp.gmail.com
      - SMTP_PORT=587
      - SMTP_USER=mkdwns@gmail.com
      - SMTP_PASS=eqzj brse yoqm bgul
      - ALERT_FROM=mkdwns@gmail.com
      - ALERT_TO=mkdwns@gmail.com
      - SCAN_CRON_HOUR=6
      - SCAN_CRON_MINUTE=0
      - SCRAPE_DELAY=3
      - TEST_OBITS_ENABLED=true

  obit-watch-ui:
    image: nginx:alpine
    container_name: obit-watch-ui
    restart: unless-stopped
    ports:
      - "3232:80"
    volumes:
      - ./index.html:/usr/share/nginx/html/index.html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro

networks:
  default:
    name: obit-watch-net
